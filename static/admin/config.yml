backend:
  name: git-gateway
  branch: main

media_folder: static/uploads
public_folder: /uploads

collections:
  - name: blog
    label: 旅行日记
    folder: content/blog
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 日期, name: date, widget: datetime }
      - { label: 地点标签, name: location, widget: string }
      - { label: 封面图片, name: cover, widget: image }
      - { label: 摘要, name: excerpt, widget: text }
      - { label: 正文, name: body, widget: markdown, media_library: {config: {multiple: false}} }
  - name: settings
    label: 网站设置
    files:
      - label: 合作版块
        name: collab
        file: _data/collab.yml
        fields:
          - { label: 左边图片, name: image_left, widget: image }
          - { label: 右边图片, name: image_right, widget: image }
