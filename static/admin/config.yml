backend:
  name: git-gateway
  branch: main

media_folder: static/uploads
public_folder: /uploads

collections:
  - name: blog_zh
    label: 旅行日记（中文）
    folder: content/zh/blog
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{uuid}}"
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 日期, name: date, widget: datetime }
      - { label: 地点标签, name: location, widget: string }
      - { label: 封面图片, name: cover, widget: image }
      - { label: 摘要, name: excerpt, widget: text }
      - { label: 正文, name: body, widget: markdown }
      - { label: 原文语言, name: source_lang, widget: hidden, default: zh }

  - name: blog_en
    label: Journal (English)
    folder: content/en/blog
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{uuid}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Location, name: location, widget: string }
      - { label: Cover Image, name: cover, widget: image }
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: Body, name: body, widget: markdown }
      - { label: Source Language, name: source_lang, widget: hidden, default: en }

  - name: blog_ja
    label: 日記（日本語）
    folder: content/ja/blog
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{uuid}}"
    fields:
      - { label: タイトル, name: title, widget: string }
      - { label: 日付, name: date, widget: datetime }
      - { label: 場所, name: location, widget: string }
      - { label: カバー画像, name: cover, widget: image }
      - { label: 概要, name: excerpt, widget: text }
      - { label: 本文, name: body, widget: markdown }
      - { label: 原文言語, name: source_lang, widget: hidden, default: ja }

  - name: settings
    label: 网站设置
    files:
      - label: 合作版块
        name: collab
        file: _data/collab.yml
        fields:
          - { label: 左边图片, name: image_left, widget: image }
          - { label: 右边图片, name: image_right, widget: image }
