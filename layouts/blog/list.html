<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Posts — EnHe</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #0f0e0c; --bg2: #141412; --white: #edeae3; --white-mid: rgba(237,234,227,0.5); --white-dim: rgba(237,234,227,0.18); --white-dimmer: rgba(237,234,227,0.07); }
body { background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; font-weight: 300; min-height: 100vh; }
body::before { content: ''; position: fixed; inset: 0; z-index: 0; opacity: 0.045; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); background-repeat: repeat; background-size: 180px; }
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1.6rem 3rem; background: rgba(15,14,12,0.85); backdrop-filter: blur(16px); border-bottom: 1px solid var(--white-dimmer); }
.nav-logo { display: flex; flex-direction: column; gap: 0.1rem; text-decoration: none; }
.nav-logo-name { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 400; letter-spacing: 0.06em; color: var(--white); line-height: 1; }
.nav-logo-sub { font-size: 0.55rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--white-dim); }
.nav-back { font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--white-mid); text-decoration: none; transition: color 0.25s; display: flex; align-items: center; gap: 0.5rem; }
.nav-back::before { content: '←'; }
.nav-back:hover { color: var(--white); }
.main { padding: 8rem 3rem 6rem; position: relative; z-index: 1; max-width: 1200px; }
.page-eyebrow { display: flex; align-items: center; gap: 1.2rem; margin-bottom: 0.8rem; }
.page-num { font-family: 'Cormorant Garamond', serif; font-size: 0.8rem; color: var(--white-dim); letter-spacing: 0.1em; }
.page-line { width: 28px; height: 1px; background: var(--white-dim); }
.page-label { font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--white-dim); }
.page-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 300; letter-spacing: -0.02em; margin-bottom: 4rem; }
.posts-list { display: flex; flex-direction: column; gap: 2px; }
.post-item { display: grid; grid-template-columns: 280px 1fr auto; align-items: center; gap: 3rem; padding: 2rem 2.5rem; background: var(--bg2); text-decoration: none; color: var(--white); transition: background 0.3s, padding-left 0.3s; }
.post-item:hover { background: #1a1917; padding-left: 3rem; }
.post-item-img { aspect-ratio: 3/2; overflow: hidden; }
.post-item-img img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.75); transition: transform 0.6s ease, filter 0.4s; }
.post-item:hover .post-item-img img { transform: scale(1.04); filter: brightness(0.9); }
.post-item-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.8rem; }
.post-item-loc { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--white-mid); }
.post-item-date { font-size: 0.6rem; color: var(--white-dim); }
.post-item-title { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; line-height: 1.25; margin-bottom: 0.6rem; }
.post-item-excerpt { font-size: 0.82rem; line-height: 1.8; color: var(--white-mid); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.post-item-arrow { font-size: 1rem; color: var(--white-dim); transition: transform 0.3s, color 0.3s; }
.post-item:hover .post-item-arrow { transform: translate(4px, -4px); color: var(--white); }
footer { border-top: 1px solid var(--white-dimmer); padding: 2.5rem 3rem; display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 1; }
.footer-left { display: flex; flex-direction: column; gap: 0.2rem; }
.footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--white); }
.footer-sub { font-size: 0.55rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--white-dim); }
footer p { font-size: 0.62rem; color: var(--white-dim); }
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">
    <span class="nav-logo-name">EnHe</span>
    <span class="nav-logo-sub">Notes from the Road</span>
  </a>
  <a href="/" class="nav-back">Back</a>
</nav>
<main class="main">
  <div class="page-eyebrow">
    <span class="page-num">001</span>
    <div class="page-line"></div>
    <span class="page-label">Journal</span>
  </div>
  <h1 class="page-title">All Posts</h1>
  <div class="posts-list">
    {{ range .Pages }}
    <a href="{{ .Permalink }}" class="post-item">
      <div class="post-item-img">
        <img src="{{ .Params.cover }}" alt="{{ .Title }}">
      </div>
      <div>
        <div class="post-item-meta">
          <span class="post-item-loc">{{ .Params.location }}</span>
          <span class="post-item-date">{{ .Date.Format "2006.01.02" }}</span>
        </div>
        <h2 class="post-item-title">{{ .Title }}</h2>
        <p class="post-item-excerpt">{{ .Params.excerpt }}</p>
      </div>
      <span class="post-item-arrow">↗</span>
    </a>
    {{ end }}
  </div>
</main>
<footer>
  <div class="footer-left">
    <span class="footer-logo">EnHe</span>
    <span class="footer-sub">Notes from the Road</span>
  </div>
  <p>© 2025 · Tokyo · Beijing</p>
</footer>
</body>
</html>
